# Global defaults for AMD Vulkan backend (Phoenix 780M, 81GB UMA)
[*]
host = 0.0.0.0
port = 8080

# Start conservative: 65K smoke-test baseline, ramp up after benchmarking
ctx-size     = 65536

# q4_0/q4_0 for bandwidth reduction on shared-memory iGPU
# User-acceptable tradeoff for speed. Benchmark q8_0/q8_0 later.
cache-type-k = q4_0
cache-type-v = q4_0
kv-unified   = true

# Vulkan does not support CUDA Flash Attention
flash-attn   = false

# fit=on helps with VRAM allocation on AMD
fit          = on
fit-target   = 256
n-gpu-layers = 99

# Single model, single slot for max context per request
models-max = 1
parallel     = 1
slots        = 1

# Conservative batching for iGPU
batch-size   = 1024
ubatch-size  = 512

# Reduced CPU threads - GPU does layer compute
threads = 4
threads-batch = 4

# Memory management
mlock            = false
mmap             = true
backend-sampling = true
sleep-idle-seconds = -1

# Speculative decode (ngram-mod works on all backends)
spec-type = ngram-mod
spec-ngram-mod-n-match = 24
spec-ngram-mod-n-min = 48
spec-ngram-mod-n-max = 96

# -------------------------------
# Qwen3.5-27B dense
# -------------------------------
[Qwen3.5-27B]
hf-repo = unsloth/Qwen3.5-27B-GGUF
hf-file = Qwen3.5-27B-UD-Q4_K_XL.gguf

# -------------------------------
# Qwen3.6-27B dense
# -------------------------------
[Qwen3.6-27B]
model = /models-mtp/Qwen3.6-27B-MTP-Q4_K_M.gguf
spec-type = mtp
spec-draft-n-max = 3
cache-type-k = q4_0
cache-type-v = q4_0
ctx-size          = 65536
load-on-startup    = false

# -------------------------------
# Qwen3.5-35B-A3B MoE
# -------------------------------
[Qwen3.5-35B-MoE]
model = /models-shared/unsloth_Qwen3.5-35B-A3B-GGUF_Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf

# -------------------------------
# Qwen3.6-35B-A3B MoE (Default for AMD)
# -------------------------------
[Qwen3.6-35B-MoE]
model = /models-shared/unsloth_Qwen3.5-35B-A3B-GGUF_Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
# Fallback to Qwen3.5 until Qwen3.6 is downloaded
cache-type-k = q4_0
cache-type-v = q4_0
ctx-size     = 65536

# -------------------------------
# Gemma-4-31B-IT
# -------------------------------
[Gemma-4-31B-IT]
hf-repo = unsloth/gemma-4-31B-it-GGUF
hf-file = gemma-4-31B-it-Q4_K_S.gguf
cache-type-k = q4_0
cache-type-v = q4_0
ctx-size     = 65536
