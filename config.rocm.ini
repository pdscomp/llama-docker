# Global defaults for AMD ROCm backend (Phoenix 780M, 81GB UMA)
[*]
host = 0.0.0.0
port = 8080

# Start conservative: 65K smoke-test baseline
ctx-size     = 65536

# q4_0/q4_0 for bandwidth reduction on shared-memory iGPU
cache-type-k = q4_0
cache-type-v = q4_0
kv-unified   = true

# ROCm may support flash attention via HIP (experimental)
# Change to false if you encounter issues
flash-attn   = true

fit          = on
fit-target   = 256
n-gpu-layers = 99

models-max = 1
parallel     = 1
slots        = 1

batch-size   = 1024
ubatch-size  = 512

threads = 4
threads-batch = 4

mlock            = false
mmap             = true
backend-sampling = true
sleep-idle-seconds = -1

spec-type = ngram-mod
spec-ngram-mod-n-match = 24
spec-ngram-mod-n-min = 48
spec-ngram-mod-n-max = 96

# -------------------------------
# Qwen3.5-27B dense
# -------------------------------
[Qwen3.5-27B]
hf-repo = unsloth/Qwen3.5-27B-GGUF
hf-file = Qwen3.5-27B-UD-Q4_K_XL.gguf

# -------------------------------
# Qwen3.6-27B dense
# -------------------------------
[Qwen3.6-27B]
model = /models-mtp/Qwen3.6-27B-MTP-Q4_K_M.gguf
spec-type = mtp
spec-draft-n-max = 3
cache-type-k = q4_0
cache-type-v = q4_0
ctx-size          = 65536
load-on-startup    = false

# -------------------------------
# Qwen3.5-35B-A3B MoE
# -------------------------------
[Qwen3.5-35B-MoE]
hf-repo = unsloth/Qwen3.5-35B-A3B-GGUF
hf-file = Qwen3.5-35B-A3B-UD-Q4_K_M.gguf

# -------------------------------
# Qwen3.6-35B-A3B MoE (Default for AMD)
# -------------------------------
[Qwen3.6-35B-MoE]
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF
hf-file = Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
cache-type-k = q4_0
cache-type-v = q4_0
ctx-size     = 65536

# -------------------------------
# Gemma-4-31B-IT
# -------------------------------
[Gemma-4-31B-IT]
hf-repo = unsloth/gemma-4-31B-it-GGUF
hf-file = gemma-4-31B-it-Q4_K_S.gguf
cache-type-k = q4_0
cache-type-v = q4_0
ctx-size     = 65536
