# Global defaults (applied to all models unless overridden)
[*]
# Networking configuration
host = 0.0.0.0
port = 8080

# Default: Long context and KV cache quantization 
ctx-size     = 262144
# Can adjust RAM prompt cache based on available memory
#cache-ram    = 16384
# Asymmetric KV cache, maintains full q8_0 precision with much less VRAM usage
cache-type-k = q8_0
cache-type-v = turbo4
kv-unified   = true

# Full GPU offload on a single 3090
fit          = on
n-gpu-layers = 99
# Only allow one model to be loaded at a time to prevent OOM
models-max = 1
# Num request slots--how many inference sequences the server can process concurrently
# Enable one active inference slot (no concurrent decoding)
# This enables the full context window dedicated to a single request (good for one user)
parallel     = 1
# Enable inspection of /slots endpoint in llama-server REST API
slots        = 1

# Can tune batch size, but found for a single request slot didn't really help
#batch-size   = 2048
#ubatch-size  = 1024

# Optional: general batching / performance
# (you can omit these to stick even closer to "defaults")
# Add these - for GPU-heavy workloads, REDUCE CPU threads
#threads = 4             # or even 2 - not 0 (default uses all cores)
#threads-batch = 4       # Same for batch processing

# Prevent swapping, lock model in memory
mlock            = true  # Lock pages in RAM (prevent swapping)
mmap             = true  # Memory-map model file (faster loading)
backend-sampling = true  # If you want max throughput

# keep models from ever unloading automatically
sleep-idle-seconds = -1

# -------------------------------
# Qwen3.5-27B dense
# -------------------------------
[Qwen3.5-27B]
hf-repo = unsloth/Qwen3.5-27B-GGUF
hf-file = Qwen3.5-27B-UD-Q4_K_XL.gguf
# loads this model immediately at server start
load-on-startup    = true
# Can override context size per-model if needed
#ctx-size          = 262144

# -------------------------------
# Qwen3.5-35B-A3B MoE
# -------------------------------
[Qwen3.5-35B-MoE]
hf-repo = unsloth/Qwen3.5-35B-A3B-GGUF
hf-file = Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
# Can override context size per-model if needed
#ctx-size     = 262144

